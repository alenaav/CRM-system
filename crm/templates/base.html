<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>CRM Система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">CRM Система</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{% url 'клиенты' %}">Клиенты</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'сотрудники' %}">Сотрудники</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'услуги' %}">Услуги</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'записи' %}">Записи</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'расписание' %}">Расписание</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'аналитика' %}">Аналитика</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'календарь' %}">Календарь</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    {% if request.session.user_id %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">Выйти</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}">Войти</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
