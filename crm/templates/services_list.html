{% extends "base.html" %}
{% block content %}
<h2>Услуги</h2>
<a href="{% url 'создать_услугу' %}" class="btn btn-success mb-2">Создать новую услугу</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Название</th>
            <th>Цена</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for service in services %}
        <tr>
            <td>{{ service.name }}</td>
            <td>{{ service.price }}</td>
            <td>
                <a href="{% url 'редактировать_услугу' service.pk %}" class="btn btn-sm btn-warning">Редактировать</a>
                <a href="{% url 'удалить_услугу' service.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
