{% extends "base.html" %}
{% block content %}
<h2>Услуги</h2>
<a href="{% url 'услуга_добавить' %}" class="btn btn-success mb-2">Добавить услугу</a>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Название</th>
      <th>Длительность (мин)</th>
      <th>Цена</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody>
    {% for service in services %}
    <tr>
      <td>{{ service.name }}</td>
      <td>{{ service.duration }}</td>
      <td>{{ service.price }}</td>
      <td>
        <a href="{% url 'услуга_редактировать' service.id %}" class="btn btn-primary btn-sm">Редактировать</a>
        <a href="{% url 'услуга_удалить' service.id %}" class="btn btn-danger btn-sm">Удалить</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
