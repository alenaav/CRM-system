{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>
        {% if form.instance.pk %}
            Редактировать запись
        {% else %}
            Добавить запись
        {% endif %}
    </h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.client.id_for_label }}" class="form-label">Клиент</label>
            {{ form.client }}
        </div>
        <div class="mb-3">
            <label for="{{ form.employee.id_for_label }}" class="form-label">Сотрудник</label>
            {{ form.employee }}
        </div>
        <div class="mb-3">
            <label for="{{ form.service.id_for_label }}" class="form-label">Услуга</label>
            {{ form.service }}
        </div>
        <div class="mb-3">
            <label for="{{ form.date.id_for_label }}" class="form-label">Дата</label>
            {{ form.date }}
        </div>
        <div class="mb-3">
            <label for="{{ form.time.id_for_label }}" class="form-label">Время</label>
            {{ form.time }}
        </div>
        <div class="mb-3">
            <label for="{{ form.status.id_for_label }}" class="form-label">Статус</label>
            {{ form.status }}
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'записи' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
