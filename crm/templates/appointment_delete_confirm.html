{% extends "base.html" %}
{% block content %}
<h2>Удалить запись</h2>
<p>Вы уверены, что хотите удалить запись: <strong>{{ appointment.client }} – {{ appointment.service }} {{ appointment.date }} {{ appointment.time }}</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" name="confirm" class="btn btn-danger">Удалить</button>
    <a href="{% url 'записи' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
