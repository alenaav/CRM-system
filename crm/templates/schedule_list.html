{% extends "base.html" %}
{% block content %}
<h2>Расписание</h2>
<a href="{% url 'расписание_добавить' %}" class="btn btn-success mb-2">Добавить запись</a>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Сотрудник</th>
      <th>Дата</th>
      <th>Начало</th>
      <th>Конец</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody>
    {% for s in schedule %}
    <tr>
      <td>{{ s.employee.name }}</td>
      <td>{{ s.date }}</td>
      <td>{{ s.start_time }}</td>
      <td>{{ s.end_time }}</td>
      <td>
        <a href="{% url 'расписание_редактировать' s.id %}" class="btn btn-primary btn-sm">Редактировать</a>
        <a href="{% url 'расписание_удалить' s.id %}" class="btn btn-danger btn-sm">Удалить</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
