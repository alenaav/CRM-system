{% extends "base.html" %}
{% block content %}
<h2>Календарь расписания: {{ month }} / {{ year }}</h2>

<div class="mb-3">
    <a class="btn btn-outline-primary btn-sm"
       href="{% url 'календарь_месяц' prev_year prev_month %}">« Предыдущий</a>
    <a class="btn btn-outline-primary btn-sm"
       href="{% url 'календарь_месяц' next_year next_month %}">Следующий »</a>
</div>

<style>
    /* Основная таблица календаря */
    table.calendar {
        width: 100%;
        table-layout: fixed;        /* Фиксированная ширина колонок */
        border-collapse: collapse;
        margin-top: 20px;
    }
    
    /* Заголовки дней недели */
    table.calendar th {
        text-align: center;
        padding: 12px 4px;
        background: linear-gradient(135deg, #0d6efd, #0b5ed7);
        color: white;
        font-weight: 600;
        font-size: 14px;
        border: 1px solid #0d6efd;
    }
    
    /* Ячейки дней — ВАЖНОЕ */
    table.calendar td {
        border: 1px solid #dee2e6;
        height: 140px;              /* Фиксированная высота */
        vertical-align: top;
        padding: 6px;
        font-size: 13px;
        position: relative;
        background: white;
        transition: background 0.2s;
    }
    
    table.calendar td:hover {
        background: #f8f9fa;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }
    
    /* Дата в ячейке */
    table.calendar td .date {
        font-weight: bold;
        font-size: 16px;
        color: #495057;
        display: block;
        margin-bottom: 4px;
        padding: 2px 4px;
        background: #e9ecef;
        border-radius: 3px;
        width: fit-content;
    }
    
    /* Записи в ячейке */
    table.calendar td .small {
        font-size: 12px;
        line-height: 1.3;
        margin-bottom: 2px;
        padding: 1px 3px;
        background: #f1f3f4;
        border-radius: 2px;
        border-left: 3px solid #0d6efd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    /* Пустые ячейки */
    td.noday {
        background: #f8f9fa !important;
        border-color: #e9ecef;
    }
    
    td.noday .date {
        background: transparent;
        color: #adb5bd;
    }
</style>

<div class="table-responsive">
    {{ calendar|safe }}
</div>
{% endblock %}
